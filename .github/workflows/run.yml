name: Market-Monitor

on:
  workflow_dispatch:      # 允许你随时手动点击按钮运行
  schedule:
    - cron: '0 */3 * * *'  # 每3小时自动运行一次

permissions:              # 重要：给程序“写”的权限，这样它才能记住发过什么
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装必要插件
        # 注意：这里增加了 pytz，专门用来判断美股时间
        run: pip install requests beautifulsoup4 pytz

      - name: 执行抓取
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python monitor.py

      - name: 保存抓取进度
        # 这段代码会让程序把“已发送”的标记存回 GitHub，防止下次重复发送
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_content_hash.txt || echo "No changes"
          git commit -m "Update history" || echo "No changes"
          git push || echo "No changes"
